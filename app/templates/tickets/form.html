{% extends "base.html" %}
{% block title %}Yeni Talep — ApartIo{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card"><div class="card-body p-4">
      <h4 class="mb-4">Yeni Talep / Arıza Bildirimi</h4>
      <form method="post" action="/tickets/new">
        <div class="mb-3">
          <label class="form-label">Daire</label>
          <select class="form-select" name="apartment_id" required>
            {% for a in apartments %}
              <option value="{{ a.id }}">{{ a.label }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="row">
          <div class="col-6 mb-3">
            <label class="form-label">Kategori</label>
            <select class="form-select" name="category" required>
              <option value="fault">Arıza</option>
              <option value="request">Talep</option>
              <option value="complaint">Şikayet</option>
              <option value="other">Diğer</option>
            </select>
          </div>
          <div class="col-6 mb-3">
            <label class="form-label">Öncelik</label>
            <select class="form-select" name="priority">
              <option value="low">Düşük</option>
              <option value="normal" selected>Normal</option>
              <option value="high">Yüksek</option>
            </select>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Başlık</label>
          <input type="text" class="form-control" name="title" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Açıklama</label>
          <textarea class="form-control" name="description" rows="4" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Gönder</button>
        <a href="/tickets" class="btn btn-outline-secondary">İptal</a>
      </form>
    </div></div>
  </div>
</div>
{% endblock %}
