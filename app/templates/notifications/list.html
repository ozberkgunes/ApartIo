{% extends "base.html" %}
{% block title %}Bildirimler — ApartIo{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h4 class="mb-0">Bildirimler</h4>
  <form method="post" action="/notifications/read-all">
    <button type="submit" class="btn btn-sm btn-outline-secondary">Tümünü Okundu İşaretle</button>
  </form>
</div>
<div class="card"><div class="card-body p-0">
  <div class="list-group list-group-flush">
    {% for n in notifications %}
    <a href="/notifications/{{ n.id }}/go"
       class="list-group-item list-group-item-action {{ '' if n.is_read else 'list-group-item-warning' }}">
      <div class="d-flex justify-content-between">
        <strong>{{ n.title }}</strong>
        <span class="small text-muted">{{ n.created_at.strftime('%d.%m.%Y %H:%M') }}</span>
      </div>
      {% if n.body %}<div class="small">{{ n.body }}</div>{% endif %}
    </a>
    {% else %}
    <div class="list-group-item text-muted text-center">Bildirim yok.</div>
    {% endfor %}
  </div>
</div></div>
{% endblock %}
